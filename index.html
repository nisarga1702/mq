<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLearn — Gamified Medical Learning Platform</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --bg4: #1e2d45;
    --card: #131c2e;
    --border: rgba(99,179,237,0.12);
    --border2: rgba(99,179,237,0.22);
    --accent: #38bdf8;
    --accent2: #818cf8;
    --accent3: #34d399;
    --accent4: #f472b6;
    --accent5: #fb923c;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --danger: #f87171;
    --warn: #fbbf24;
    --success: #34d399;
    --r: 12px;
    --r2: 8px;
    --shadow: 0 4px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Layout */
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; min-height: 100vh; background: var(--card);
    border-right: 1px solid var(--border); display: flex;
    flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100;
  }
  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: -2px; }
  .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: var(--r2); cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text2); transition: all .15s; border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--bg4); color: var(--text); }
  .nav-item.active { background: rgba(56,189,248,0.12); color: var(--accent); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-section { font-size: 10px; font-weight: 700; color: var(--text3); padding: 12px 12px 4px; letter-spacing: .08em; text-transform: uppercase; }
  .sidebar-user {
    padding: 14px 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .main-content { margin-left: 240px; flex: 1; min-height: 100vh; }
  .top-bar {
    height: 60px; background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; position: sticky; top: 0; z-index: 50;
  }
  .page-content { padding: 28px; max-width: 1200px; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 20px;
  }
  .card-sm { padding: 14px 16px; }
  .grid { display: grid; gap: 16px; }
  .g2 { grid-template-columns: repeat(2, 1fr); }
  .g3 { grid-template-columns: repeat(3, 1fr); }
  .g4 { grid-template-columns: repeat(4, 1fr); }

  /* Stat cards */
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 18px 20px;
  }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  .stat-value { font-size: 28px; font-weight: 800; font-family: 'Syne', sans-serif; margin-top: 6px; }
  .stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: var(--r2); font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #0a0e1a; }
  .btn-primary:hover { background: #7dd3f9; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border2); }
  .btn-outline:hover { background: var(--bg4); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #0a0e1a; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-lg { padding: 14px 28px; font-size: 16px; }
  .btn-block { width: 100%; justify-content: center; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge-blue { background: rgba(56,189,248,0.15); color: var(--accent); }
  .badge-green { background: rgba(52,211,153,0.15); color: var(--success); }
  .badge-purple { background: rgba(129,140,248,0.15); color: var(--accent2); }
  .badge-orange { background: rgba(251,146,60,0.15); color: var(--accent5); }
  .badge-pink { background: rgba(244,114,182,0.15); color: var(--accent4); }
  .badge-red { background: rgba(248,113,113,0.15); color: var(--danger); }

  /* Progress */
  .progress-bar { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }

  /* Forms */
  input, select, textarea {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r2); color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 10px 14px; width: 100%; outline: none; transition: border .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  label { font-size: 13px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* Tag */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .fade-in { animation: fadeIn .3s ease; }

  /* Notification */
  .notif {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    background: var(--card); border: 1px solid var(--border2); border-radius: var(--r);
    padding: 14px 18px; max-width: 320px; box-shadow: var(--shadow);
    animation: fadeIn .3s ease; display: flex; align-items: flex-start; gap: 10px;
  }

  /* Modals */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 200; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--card); border: 1px solid var(--border2); border-radius: var(--r);
    padding: 28px; max-width: 540px; width: 90vw; max-height: 90vh;
    overflow-y: auto; animation: fadeIn .25s ease;
  }
  .modal-lg { max-width: 800px; }

  /* Auth */
  .auth-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 50%, rgba(56,189,248,0.05) 0%, transparent 50%),
                      radial-gradient(circle at 80% 20%, rgba(129,140,248,0.05) 0%, transparent 50%);
  }
  .auth-card {
    background: var(--card); border: 1px solid var(--border2);
    border-radius: 16px; padding: 40px; width: 420px; max-width: 95vw;
    box-shadow: var(--shadow);
  }

  /* Simulation */
  .sim-patient { border-left: 3px solid var(--accent5); }
  .choice-opt {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 12px 16px; cursor: pointer; font-size: 14px; transition: all .15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .choice-opt:hover { border-color: var(--accent); background: rgba(56,189,248,0.06); }
  .choice-opt.selected { border-color: var(--accent); background: rgba(56,189,248,0.12); }
  .choice-opt.correct { border-color: var(--success); background: rgba(52,211,153,0.12); }
  .choice-opt.wrong { border-color: var(--danger); background: rgba(248,113,113,0.12); }

  /* Quiz */
  .quiz-opt {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 14px 18px; cursor: pointer;
    font-size: 14px; transition: all .15s; margin-bottom: 8px;
  }
  .quiz-opt:hover:not(.disabled) { border-color: var(--accent); background: rgba(56,189,248,0.07); }
  .quiz-opt.selected { border-color: var(--accent2); background: rgba(129,140,248,0.1); }
  .quiz-opt.correct { border-color: var(--success) !important; background: rgba(52,211,153,0.12) !important; }
  .quiz-opt.wrong { border-color: var(--danger) !important; background: rgba(248,113,113,0.12) !important; }
  .quiz-opt.disabled { cursor: default; }

  /* Leaderboard */
  .lb-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .lb-rank { font-size: 18px; font-weight: 800; font-family: 'Syne', sans-serif; width: 32px; text-align: center; }

  /* Room */
  .chat-msg { margin-bottom: 10px; }
  .chat-bubble {
    display: inline-block; padding: 8px 12px; border-radius: 10px;
    font-size: 13px; max-width: 280px;
  }
  .chat-bubble.me { background: rgba(56,189,248,0.15); color: var(--accent); }
  .chat-bubble.them { background: var(--bg3); color: var(--text); }

  /* Level progress */
  .level-badge {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px;
  }

  /* Scrollable */
  .scroll-y { overflow-y: auto; }

  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .main-content { margin-left: 200px; }
    .g4 { grid-template-columns: repeat(2, 1fr); }
    .g3 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .sidebar { transform: translateX(-200px); }
    .main-content { margin-left: 0; }
    .g2,.g3,.g4 { grid-template-columns: 1fr; }
  }
</style>
</head>

/* ==================== AUTH ==================== */
function AuthPage({ onAuth }) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({ name:"", email:"", password:"", role:"student" });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  function submit(e) {
    e.preventDefault(); setErr("");
    if (!form.email || !form.password) { setErr("All fields required"); return; }
    if (mode === "signup" && !form.name) { setErr("Name required"); return; }
    setLoading(true);
    setTimeout(() => {
      const users = JSON.parse(localStorage.getItem("ml_users") || "[]");
      if (mode === "login") {
        const u = users.find(u => u.email === form.email && u.password === form.password);
        if (!u) { setErr("Invalid credentials"); setLoading(false); return; }
        localStorage.setItem("ml_current", JSON.stringify(u));
        onAuth(u);
      } else {
        if (users.find(u => u.email === form.email)) { setErr("Email already registered"); setLoading(false); return; }
        const newUser = {
          id: Date.now(), name: form.name, email: form.email,
          password: form.password, role: form.role,
          level: 1, xp: 0, score: 0, quizScores: [], casesCompleted: 0,
          accuracy: 0, totalAnswers: 0, correctAnswers: 0,
          preQuizDone: false, preQuizLevel: "beginner",
          color: ["#38bdf8","#818cf8","#34d399","#f472b6","#fb923c"][Math.floor(Math.random()*5)]
        };
        users.push(newUser);
        localStorage.setItem("ml_users", JSON.stringify(users));
        localStorage.setItem("ml_current", JSON.stringify(newUser));
        onAuth(newUser);
      }
      setLoading(false);
    }, 700);
  }

  return (
    <div className="auth-page">
      <div className="auth-card fade-in">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#38bdf8,#818cf8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px"}}>⚕️</div>
          <h1 style={{fontSize:26,fontWeight:800,marginBottom:4}}>MedLearn</h1>
          <p style={{color:"var(--text3)",fontSize:13}}>Gamified Medical Learning Platform</p>
        </div>

        <div style={{display:"flex",background:"var(--bg3)",borderRadius:10,padding:3,marginBottom:22,gap:2}}>
          {["login","signup"].map(m=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"9px 0",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:14,transition:"all .15s",background:mode===m?"var(--card)":"transparent",color:mode===m?"var(--text)":"var(--text3)"}}>
              {m==="login"?"Sign In":"Sign Up"}
            </button>
          ))}
        </div>

        <form onSubmit={submit}>
          {mode==="signup" && (
            <div className="form-group">
              <label>Full Name</label>
              <input placeholder="Dr. Your Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
            </div>
          )}
          <div className="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="you@hospital.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} />
          </div>
          <div className="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} />
          </div>
          {mode==="signup" && (
            <div className="form-group">
              <label>Your Role</label>
              <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                <option value="student">Medical Student</option>

                <option value="doctor">Doctor</option>

          </div>
        )}

    </div>
  );

/* ==================== PRE-QUIZ ==================== */
function PreQuiz({ onComplete }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);

  const beginnerQs = QUIZ_QUESTIONS.filter(q=>q.difficulty==="beginner").slice(0,5);

  function next() {
    if (selected===null) return;
    const newAns = [...answers, selected];
    if (step < beginnerQs.length-1) {
      setAnswers(newAns); setSelected(null); setStep(s=>s+1);
    } else {
      const correct = newAns.filter((a,i)=>a===beginnerQs[i].ans).length;
      const score = (correct/beginnerQs.length)*100;
      let level = score >= 80 ? "advanced" : score >= 50 ? "intermediate" : "beginner";
      onComplete(level, score);
    }
  }

  const q = beginnerQs[step];
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div style={{width:560,maxWidth:"95vw"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <span className="badge badge-blue" style={{fontSize:13,padding:"6px 14px"}}>Pre-Assessment Quiz</span>
          <h2 style={{fontSize:22,marginTop:12}}>Assess Your Current Level</h2>
          <p style={{color:"var(--text3)",fontSize:14,marginTop:4}}>5 questions to personalise your learning path</p>
        </div>
        <div style={{background:"var(--bg3)",borderRadius:4,height:6,marginBottom:20,overflow:"hidden"}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",width:`${(step/beginnerQs.length)*100}%`,transition:"width .5s"}}/>
        </div>
        <div className="card fade-in">
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:8}}>Question {step+1} of {beginnerQs.length}</div>
          <p style={{fontSize:16,fontWeight:600,marginBottom:20,lineHeight:1.5}}>{q.q}</p>
          {q.opts.map((opt,i)=>(
            <div key={i} className={`quiz-opt ${selected===i?"selected":""}`} onClick={()=>setSelected(i)}>
              <span style={{marginRight:8,color:selected===i?"var(--accent2)":"var(--text3)",fontWeight:700}}>{String.fromCharCode(65+i)}.</span>
              {opt}
            </div>
          ))}
          <button className="btn btn-primary" style={{marginTop:16}} disabled={selected===null} onClick={next}>
            {step < beginnerQs.length-1 ? "Next →" : "See Results →"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ==================== SIMULATION ==================== */
function Simulation({ user, updateUser }) {
  const [view, setView] = useState("list"); // list | sim
  const [currentCase, setCurrentCase] = useState(null);
  const [phase, setPhase] = useState("intro"); // intro | diagnosis | treatment | outcome
  const [diagSel, setDiagSel] = useState(null);
  const [txSel, setTxSel] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [role, setRole] = useState(null);

  function startCase(c) {
    setCurrentCase(c); setPhase("roleSelect"); setDiagSel(null); setTxSel(null); setShowResult(false); setView("sim");
  }

  function submitDiag() {
    if (!diagSel) return;
    setPhase("treatment");
  }

  function submitTx() {
    if (!txSel) return;
    const diagCorrect = currentCase.diagnosisOptions.find(d=>d.id===diagSel)?.correct||false;
    const txCorrect = currentCase.treatmentOptions.find(t=>t.id===txSel)?.correct||false;
    const pts = (diagCorrect?currentCase.points*0.5:0) + (txCorrect?currentCase.points*0.5:0);
    setShowResult(true);
    updateUser({
      score: user.score + pts,
      xp: user.xp + pts * 0.5,
      casesCompleted: user.casesCompleted + 1,
      totalAnswers: user.totalAnswers + 2,
      correctAnswers: user.correctAnswers + (diagCorrect?1:0) + (txCorrect?1:0)
    });
    notify(`Case completed! +${Math.round(pts)} pts`, "success");
    setPhase("outcome");
  }

  function diffColor(d) {
    return d==="beginner"?"var(--success)":d==="intermediate"?"var(--warn)":"var(--danger)";
  }

  if (view==="list") return (
    <div className="page-content fade-in">
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:800}}>🏥 Clinical Simulation</h2>
        <p style={{color:"var(--text2)",marginTop:4}}>Solve real patient cases with role-based assignments</p>
      </div>
      <div className="grid" style={{gap:16}}>
        {MOCK_CASES.map(c=>(
          <div key={c.id} className="card" style={{cursor:"pointer",transition:"all .15s"}}
               onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
               onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span className="badge badge-purple">{c.specialty}</span>
                  <span className="badge" style={{background:diffColor(c.difficulty)+"22",color:diffColor(c.difficulty),textTransform:"capitalize"}}>{c.difficulty}</span>
                </div>
                <h3 style={{fontSize:16,fontWeight:700,marginBottom:6}}>{c.title}</h3>
                <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.5}}>{c.presentation.slice(0,120)}…</p>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:20,fontWeight:800,color:"var(--accent)",fontFamily:"'Syne',sans-serif"}}>{c.points}</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>points</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,marginTop:12,flexWrap:"wrap"}}>
              {c.symptoms.slice(0,3).map(s=><span key={s} style={{fontSize:11,padding:"2px 7px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:4,color:"var(--text2)"}}>{s}</span>)}
              {c.symptoms.length>3 && <span style={{fontSize:11,color:"var(--text3)"}}>+{c.symptoms.length-3} more</span>}
            </div>
            <button className="btn btn-primary btn-sm" style={{marginTop:14}} onClick={()=>startCase(c)}>
              Start Case →
            </button>
          </div>
        ))}
      </div>
    </div>
  );

  // Role select
  if (phase==="roleSelect") return (
    <div className="page-content fade-in">
      <button className="btn btn-outline btn-sm" style={{marginBottom:16}} onClick={()=>{setView("list");setPhase("intro");}}>← Back to Cases</button>
      <h2 style={{fontSize:20,fontWeight:800,marginBottom:6}}>{currentCase.title}</h2>
      <p style={{color:"var(--text2)",fontSize:14,marginBottom:20}}>Select your role for this simulation</p>
      <div className="grid g4" style={{marginBottom:20}}>
        {ROLES.map(r=>(
          <div key={r.id} className="card" style={{cursor:"pointer",borderColor:role===r.id?r.color:"var(--border)",transition:"all .15s",textAlign:"center"}}
               onClick={()=>setRole(r.id)}>
            <div style={{fontSize:32,marginBottom:8}}>{r.icon}</div>
            <div style={{fontWeight:700,fontSize:14,color:role===r.id?r.color:"var(--text)"}}>{r.label}</div>

            <div style={{fontSize:11,color:r.color,marginTop:6,fontWeight:600}}>{r.perk}</div>
          </div>
        ))}
      </div>
      <button className="btn btn-primary" disabled={!role} onClick={()=>setPhase("intro")}>Begin Simulation →</button>
    </div>
  );

  // Case intro
  if (phase==="intro") return (
    <div className="page-content fade-in">
      <button className="btn btn-outline btn-sm" style={{marginBottom:16}} onClick={()=>setPhase("roleSelect")}>← Change Role</button>
      <div className="card sim-patient" style={{marginBottom:16}}>
        <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:16}}>
          <span style={{fontSize:32}}>🧑‍⚕️</span>

            <span style={{fontWeight:700,color:"var(--text3)",minWidth:18}}>{d.id.toUpperCase()}.</span>

  // Treatment
  if (phase==="treatment") return (
    <div className="page-content fade-in">
      <div className="card" style={{marginBottom:20}}>
        <h3 style={{fontSize:18,fontWeight:800}}>Select Treatment Plan</h3>

          <div key={t.id} className={`choice-opt ${txSel===t.id?"selected":""}`} onClick={()=>setTxSel(t.id)}>
            <span style={{fontWeight:700,color:"var(--text3)",minWidth:18}}>{t.id.toUpperCase()}.</span>
            <span>{t.text}</span>
          </div>
        ))}
      </div>
      <button className="btn btn-primary" disabled={!txSel} onClick={submitTx}>Submit Treatment →</button>
    </div>
  );

  // Outcome
  if (phase==="outcome") {
    const diagCorrect = currentCase.diagnosisOptions.find(d=>d.id===diagSel)?.correct||false;
    const txCorrect = currentCase.treatmentOptions.find(t=>t.id===txSel)?.correct||false;
    const pts = (diagCorrect?currentCase.points*0.5:0)+(txCorrect?currentCase.points*0.5:0);
    return (
      <div className="page-content fade-in">
        <div className="card" style={{marginBottom:16,borderColor:diagCorrect&&txCorrect?"var(--success)":"var(--warn)"}}>

            <div style={{fontSize:28,fontWeight:800,color:"var(--accent)",margin:"12px 0",fontFamily:"'Syne',sans-serif"}}>+{Math.round(pts)} pts</div>

            <div style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>DIAGNOSIS</div>
              <div style={{fontSize:14,fontWeight:700,color:diagCorrect?"var(--success)":"var(--danger)"}}>{diagCorrect?"✓ Correct":"✗ Incorrect"}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>TREATMENT</div>
              <div style={{fontSize:14,fontWeight:700,color:txCorrect?"var(--success)":"var(--danger)"}}>{txCorrect?"✓ Correct":"✗ Incorrect"}</div>

          </div>
        </div>

          <div style={{fontSize:12,color:"var(--text3)",marginBottom:6,fontWeight:700}}>CLINICAL OUTCOME</div>
          <p style={{fontSize:14,lineHeight:1.6}}>{currentCase.outcome}</p>
        </div>
        <div className="card" style={{marginBottom:16,borderLeft:"3px solid var(--accent2)"}}>
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:6,fontWeight:700}}>LEARNING POINTS</div>
          <p style={{fontSize:14,lineHeight:1.6}}>{currentCase.learning}</p>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-primary" onClick={()=>{setView("list");setPhase("intro");}}>← More Cases</button>
          <button className="btn btn-outline" onClick={()=>{startCase(currentCase);}}>Retry Case</button>
        </div>
      </div>
    );
  }

  return null;
}

/* ==================== QUIZ ==================== */
function Quiz({ user, updateUser }) {
  const [mode, setMode] = useState("select"); // select | quiz | result
  const [difficulty, setDifficulty] = useState(user.preQuizLevel||"beginner");
  const [questions, setQuestions] = useState([]);
  const [step, setStep] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [results, setResults] = useState([]);

  function startQuiz() {
    const pool = QUIZ_QUESTIONS.filter(q=>q.difficulty===difficulty||difficulty==="all");
    const shuffled = [...pool].sort(()=>Math.random()-.5).slice(0,Math.min(pool.length,7));
    setQuestions(shuffled); setStep(0); setSelected(null); setRevealed(false); setResults([]); setMode("quiz");
  }

  function reveal() {
    if (selected===null) return;
    setRevealed(true);
  }

  function next() {
    const correct = selected === questions[step].ans;
    const newResults = [...results, { q: questions[step], selected, correct }];
    if (step < questions.length-1) {
      setResults(newResults); setSelected(null); setRevealed(false); setStep(s=>s+1);
    } else {
      setResults(newResults);
      const score = newResults.filter(r=>r.correct).length;
      const pct = Math.round(score/questions.length*100);
      const pts = score * 50;
      updateUser({
        score: user.score + pts,
        xp: user.xp + pts * 0.3,
        quizScores: [...(user.quizScores||[]), { score:pct, difficulty, date:new Date().toLocaleDateString() }],
        totalAnswers: user.totalAnswers + questions.length,
        correctAnswers: user.correctAnswers + score
      });
      if (pct < 40) notify("Consider mentorship — you scored below 40%", "warn");
      else if (pct === 100) notify("Perfect score! 🎉", "success");
      setMode("result");
    }
  }

  if (mode==="select") return (
    <div className="page-content fade-in">
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>🧠 Adaptive Quiz</h2>
      <p style={{color:"var(--text2)",marginBottom:20}}>Test your medical knowledge — difficulty adapts to your level</p>
      <div className="grid g3" style={{marginBottom:20}}>
        {["beginner","intermediate","advanced"].map(d=>{
          const colors={beginner:"var(--success)",intermediate:"var(--warn)",advanced:"var(--danger)"};
          return (
            <div key={d} className="card" style={{cursor:"pointer",borderColor:difficulty===d?colors[d]:"var(--border)",transition:"all .15s"}} onClick={()=>setDifficulty(d)}>
              <div style={{fontSize:24,marginBottom:8}}>{d==="beginner"?"🌱":d==="intermediate"?"🔥":"⚡"}</div>
              <div style={{fontWeight:700,textTransform:"capitalize",color:difficulty===d?colors[d]:"var(--text)"}}>{d}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>
                {QUIZ_QUESTIONS.filter(q=>q.difficulty===d).length} questions
              </div>
            </div>
          );
        })}
      </div>
      {user.quizScores?.length > 0 && (
        <div className="card" style={{marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Recent Quiz History</div>
          {user.quizScores.slice(-5).reverse().map((s,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontSize:13,textTransform:"capitalize"}}>{s.difficulty}</span>
              <span style={{fontSize:12,color:"var(--text3)"}}>{s.date}</span>
              <span style={{fontWeight:700,color:s.score>=70?"var(--success)":s.score>=40?"var(--warn)":"var(--danger)"}}>{s.score}%</span>
            </div>
          ))}
        </div>
      )}
      <button className="btn btn-primary btn-lg" onClick={startQuiz}>Start Quiz →</button>
    </div>
  );

  if (mode==="quiz") {
    const q = questions[step];
    return (
      <div className="page-content fade-in">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:13,color:"var(--text3)"}}>Question {step+1}/{questions.length}</span>
          <span className="badge badge-purple" style={{textTransform:"capitalize"}}>{difficulty}</span>
        </div>
        <div style={{background:"var(--bg3)",borderRadius:4,height:5,marginBottom:20,overflow:"hidden"}}>
          <div style={{height:"100%",background:"var(--accent2)",width:`${(step/questions.length)*100}%`,transition:"width .4s"}}/>
        </div>
        <div className="card" style={{marginBottom:16}}>
          <p style={{fontSize:16,fontWeight:600,lineHeight:1.5}}>{q.q}</p>
        </div>
        {q.opts.map((opt,i)=>{
          let cls = "quiz-opt";
          if (revealed) {
            if (i===q.ans) cls+=" correct";
            else if (i===selected) cls+=" wrong";
          } else if (i===selected) cls+=" selected";
          return (
            <div key={i} className={cls+(revealed?" disabled":"")} onClick={()=>!revealed&&setSelected(i)}>
              <span style={{marginRight:8,fontWeight:700,color:"var(--text3)"}}>{String.fromCharCode(65+i)}.</span>{opt}
            </div>
          );
        })}
        {revealed && (
          <div className="card" style={{marginTop:12,borderLeft:"3px solid var(--accent2)",background:"rgba(129,140,248,0.05)"}}>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:4,fontWeight:700}}>EXPLANATION</div>
            <p style={{fontSize:13,lineHeight:1.6}}>{q.exp}</p>
          </div>
        )}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          {!revealed
            ? <button className="btn btn-outline" disabled={selected===null} onClick={reveal}>Check Answer</button>
            : <button className="btn btn-primary" onClick={next}>{step<questions.length-1?"Next →":"See Results →"}</button>
          }
        </div>
      </div>
    );
  }

  if (mode==="result") {
    const correct = results.filter(r=>r.correct).length;
    const pct = Math.round(correct/results.length*100);
    return (
      <div className="page-content fade-in">
        <div className="card" style={{textAlign:"center",padding:28,marginBottom:20,borderColor:pct>=70?"var(--success)":pct>=40?"var(--warn)":"var(--danger)"}}>
          <div style={{fontSize:48,marginBottom:10}}>{pct>=70?"🎯":pct>=40?"📚":"💡"}</div>
          <h2 style={{fontSize:26,fontWeight:800}}>{pct}%</h2>
          <p style={{color:"var(--text2)",marginTop:6}}>{correct} / {results.length} correct</p>
          <div style={{fontSize:14,marginTop:10,color:pct>=70?"var(--success)":pct>=40?"var(--warn)":"var(--danger)",fontWeight:600}}>
            {pct>=70?"Excellent performance!":pct>=40?"Good effort, keep going!":"More practice recommended"}
          </div>
          {pct < 40 && (
            <div style={{marginTop:16,padding:12,background:"rgba(251,146,60,0.1)",border:"1px solid var(--accent5)",borderRadius:8,fontSize:13}}>
              💡 We recommend connecting with a mentor to strengthen your foundation.
            </div>
          )}
        </div>
        <div className="card" style={{marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Review Answers</div>
          {results.map((r,i)=>(
            <div key={i} style={{marginBottom:12,padding:10,background:"var(--bg3)",borderRadius:8,borderLeft:`3px solid ${r.correct?"var(--success)":"var(--danger)"}`}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{r.q.q}</div>
              <div style={{fontSize:12,color:r.correct?"var(--success)":"var(--danger)"}}>
                {r.correct?"✓ Correct":"✗ Incorrect"} — Correct: {r.q.opts[r.q.ans]}
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-primary" onClick={()=>setMode("select")}>← Quiz Menu</button>
          <button className="btn btn-outline" onClick={startQuiz}>Retry</button>
        </div>
      </div>
    );
  }
}

/* ==================== MULTIPLAYER ==================== */
function Multiplayer({ user }) {
  const [view, setView] = useState("lobby"); // lobby | room
  const [rooms, setRooms] = useState([
    { id:"R001", name:"Cardiology Ward", host:"Dr. Priya Sharma", members:3, max:5, status:"active", case:"Chest Pain — 58M" },
    { id:"R002", name:"Peds Emergency", host:"Aisha Nair", members:2, max:4, status:"active", case:"Fever + Rash — 8F" },
    { id:"R003", name:"ICU Round", host:"Dr. Vikram Rao", members:4, max:4, status:"full", case:"Confusion + Polyuria — 45M" }
  ]);
  const [currentRoom, setCurrentRoom] = useState(null);
  const [messages, setMessages] = useState([
    { from:"System", text:"Room created. Waiting for team members…", ts:"10:00" },
    { from:"Dr. Priya Sharma", text:"Welcome! I'm the attending. Let's start with the vitals.", ts:"10:01", role:"Doctor" },
    { from:"Aisha Nair", text:"Patient BP is critically elevated. Should we do ECG stat?", ts:"10:01", role:"Intern" }
  ]);
  const [newMsg, setNewMsg] = useState("");
  const [roomName, setRoomName] = useState("");
  const [showCreate, setShowCreate] = useState(false);
  const chatRef = useRef(null);

  function joinRoom(r) {
    if (r.status==="full") { notify("Room is full!", "error"); return; }
    setCurrentRoom(r);
    setMessages(prev=>[...prev,{from:"System",text:`${user.name} joined the room.`,ts:new Date().toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"})}]);
    setView("room");
  }

  function sendMsg() {
    if (!newMsg.trim()) return;
    setMessages(prev=>[...prev,{from:user.name,text:newMsg,ts:new Date().toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"}),self:true,role:user.role}]);
    setNewMsg("");
    setTimeout(()=>{
      const bots=["Dr. Priya Sharma","Aisha Nair","System"];
      const botReplies=["Good point! Let's verify with labs.","Agreed. I'll order the investigation now.","The patient's condition is stable for now.","Interesting presentation. Could be multiple differentials.","Let's review the ECG together."];
      setMessages(prev=>[...prev,{from:bots[Math.floor(Math.random()*bots.length)],text:botReplies[Math.floor(Math.random()*botReplies.length)],ts:new Date().toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"})}]);
      if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight;
    },1200);
    if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight;
  }

  function createRoom() {
    if(!roomName.trim()) return;
    const r={id:`R${Date.now()}`,name:roomName,host:user.name,members:1,max:5,status:"active",case:MOCK_CASES[0].title};
    setRooms(prev=>[r,...prev]);
    setShowCreate(false); setRoomName("");
    joinRoom(r);
    notify("Room created!", "success");
  }

  if (view==="room") return (
    <div className="page-content fade-in" style={{maxHeight:"calc(100vh - 60px)",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button className="btn btn-outline btn-sm" onClick={()=>setView("lobby")}>← Leave Room</button>
        <div>
          <h3 style={{fontSize:16,fontWeight:700}}>{currentRoom.name}</h3>
          <div style={{fontSize:12,color:"var(--text3)"}}>Case: {currentRoom.case}</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
          <span style={{width:8,height:8,background:"var(--success)",borderRadius:"50%",display:"inline-block"}}/>
          <span style={{fontSize:12,color:"var(--text2)"}}>{currentRoom.members} online</span>
        </div>
      </div>

      {/* Role tags */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {ROLES.map(r=><span key={r.id} className="badge" style={{background:r.color+"22",color:r.color}}>{r.icon} {r.label}</span>)}
      </div>

      {/* Chat */}
      <div ref={chatRef} style={{flex:1,overflowY:"auto",background:"var(--bg3)",borderRadius:10,padding:14,marginBottom:12,minHeight:280,maxHeight:380}}>
        {messages.map((m,i)=>(
          <div key={i} className="chat-msg" style={{textAlign:m.self?"right":"left"}}>
            {!m.self&&<div style={{fontSize:11,color:"var(--text3)",marginBottom:2}}>{m.from}{m.role?` · ${m.role}`:""} {m.ts}</div>}
            <div className={`chat-bubble ${m.self?"me":"them"}`} style={m.from==="System"?{background:"transparent",color:"var(--text3)",fontStyle:"italic",fontSize:12}:{}}>
              {m.text}
            </div>
            {m.self&&<div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{m.ts}</div>}
          </div>
        ))}
      </div>

      {/* Input */}
      <div style={{display:"flex",gap:8}}>
        <input placeholder="Type your clinical observation…" value={newMsg} onChange={e=>setNewMsg(e.target.value)}
               onKeyDown={e=>e.key==="Enter"&&sendMsg()} style={{flex:1}} />
        <button className="btn btn-primary" onClick={sendMsg}>Send</button>
      </div>
    </div>
  );

  return (
    <div className="page-content fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800}}>👥 Multiplayer Sessions</h2>
          <p style={{color:"var(--text2)",marginTop:4}}>Collaborate on clinical cases in real-time</p>
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowCreate(true)}>+ Create Room</button>
      </div>

      {showCreate && (
        <div className="card" style={{marginBottom:16,borderColor:"var(--accent)"}}>
          <h4 style={{marginBottom:12}}>Create New Room</h4>
          <div style={{display:"flex",gap:8}}>
            <input placeholder="Room name (e.g. Neurology Ward)" value={roomName} onChange={e=>setRoomName(e.target.value)}
                   onKeyDown={e=>e.key==="Enter"&&createRoom()} />
            <button className="btn btn-primary btn-sm" onClick={createRoom}>Create</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setShowCreate(false)}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {rooms.map(r=>(
          <div key={r.id} className="card" style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:42,height:42,borderRadius:10,background:"rgba(56,189,248,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🏥</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:15}}>{r.name}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>Host: {r.host} · Case: {r.case}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:13,marginBottom:4}}>
                <span style={{color:r.status==="full"?"var(--danger)":"var(--success)",fontWeight:600}}>{r.members}/{r.max}</span>
                <span style={{color:"var(--text3)",fontSize:11}}> members</span>
              </div>
              <button className="btn btn-sm" style={{background:r.status==="full"?"var(--bg4)":"var(--accent)",color:r.status==="full"?"var(--text3)":"#0a0e1a",border:"none"}}
                      onClick={()=>joinRoom(r)}>
                {r.status==="full"?"Full":"Join →"}
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ==================== PROFILE ==================== */
function Profile({ user, updateUser, onLogout }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ name: user.name, role: user.role });

  function save() {
    updateUser({ name: form.name, role: form.role });
    setEditing(false);
    notify("Profile updated!", "success");
  }

  const initials = user.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
  const accuracy = user.totalAnswers > 0 ? Math.round(user.correctAnswers/user.totalAnswers*100) : 0;

  return (
    <div className="page-content fade-in">
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:20}}>👤 Profile</h2>
      <div className="grid g2">
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
              <div style={{width:64,height:64,borderRadius:"50%",background:user.color+"33",color:user.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800}}>{initials}</div>
              <div>
                <div style={{fontSize:18,fontWeight:800}}>{user.name}</div>
                <div style={{fontSize:13,color:"var(--text3)",textTransform:"capitalize",marginTop:2}}>{user.role}</div>
                <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>{user.email}</div>
              </div>
            </div>
            {editing ? (
              <>
                <div className="form-group">
                  <label>Name</label>
                  <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Role</label>
                  <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    <option value="student">Student</option>
                    <option value="intern">Intern</option>
                    <option value="doctor">Doctor</option>
                    <option value="nurse">Nurse</option>
                    <option value="mentor">Mentor</option>
                  </select>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-primary btn-sm" onClick={save}>Save</button>
                  <button className="btn btn-outline btn-sm" onClick={()=>setEditing(false)}>Cancel</button>
                </div>
              </>
            ) : (
              <button className="btn btn-outline btn-sm" onClick={()=>setEditing(true)}>Edit Profile</button>
            )}
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Performance Stats</div>
            <div className="grid g2" style={{gap:10}}>
              {[
                { label:"Level", val:user.level, color:"var(--accent)" },
                { label:"XP", val:user.xp, color:"var(--accent2)" },
                { label:"Cases", val:user.casesCompleted, color:"var(--success)" },
                { label:"Accuracy", val:`${accuracy}%`, color:"var(--accent5)" }
              ].map(s=>(
                <div key={s.label} style={{textAlign:"center",padding:12,background:"var(--bg3)",borderRadius:8}}>
                  <div style={{fontSize:20,fontWeight:800,color:s.color,fontFamily:"'Syne',sans-serif"}}>{s.val}</div>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Quiz History</div>
            {user.quizScores?.length > 0
              ? user.quizScores.slice(-8).reverse().map((s,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
                    <span style={{textTransform:"capitalize",color:"var(--text2)"}}>{s.difficulty}</span>
                    <span style={{color:"var(--text3)",fontSize:12}}>{s.date}</span>
                    <span style={{fontWeight:700,color:s.score>=70?"var(--success)":s.score>=40?"var(--warn)":"var(--danger)"}}>{s.score}%</span>
                  </div>
                ))
              : <p style={{color:"var(--text3)",fontSize:13}}>No quizzes taken yet. Start one!</p>
            }
          </div>
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Difficulty Level</div>
            <div style={{padding:12,background:"var(--bg3)",borderRadius:8,textAlign:"center"}}>
              <div style={{fontSize:22,marginBottom:4}}>{user.preQuizLevel==="advanced"?"⚡":user.preQuizLevel==="intermediate"?"🔥":"🌱"}</div>
              <div style={{fontWeight:700,textTransform:"capitalize",color:"var(--accent)"}}>{user.preQuizLevel||"Beginner"}</div>

            </div>
          </div>
          <button className="btn btn-danger btn-sm btn-block" onClick={onLogout}>Sign Out</button>
        </div>
      </div>
    </div>
  );
}

/* ==================== NOTIFICATION COMPONENT ==================== */
function NotifToast() {
  const [notif, setNotif] = useState(null);
  useEffect(() => { setGlobalNotif = setNotif; }, []);
  useEffect(() => { if (notif) { const t = setTimeout(()=>setNotif(null), 3500); return ()=>clearTimeout(t); } }, [notif]);
  if (!notif) return null;
  const colors = { success:"var(--success)", error:"var(--danger)", warn:"var(--warn)", info:"var(--accent)" };
  const icons = { success:"✓", error:"✕", warn:"⚠", info:"ℹ" };
  return (
    <div className="notif" style={{borderColor:colors[notif.type]||"var(--border2)"}}>
      <span style={{color:colors[notif.type]||"var(--accent)",fontWeight:700,fontSize:14}}>{icons[notif.type||"info"]}</span>
      <span style={{fontSize:13}}>{notif.msg}</span>
    </div>
  );
}

/* ==================== MAIN APP ==================== */
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [showPreQuiz, setShowPreQuiz] = useState(false);

  useEffect(() => {
    const saved = localStorage.getItem("ml_current");
    if (saved) {
      const u = JSON.parse(saved);
      setUser(u);
      if (!u.preQuizDone) setShowPreQuiz(true);
    }
  }, []);

  function handleAuth(u) {
    setUser(u);
    if (!u.preQuizDone) setShowPreQuiz(true);
  }

  function handlePreQuiz(level, score) {
    updateUser({ preQuizDone: true, preQuizLevel: level, xp: Math.round(score) });
    setShowPreQuiz(false);
    notify(`Level assessed: ${level.charAt(0).toUpperCase()+level.slice(1)}! 🎉`, "success");
  }

  function updateUser(delta) {
    setUser(prev => {
      const newLevel = Math.max(1, Math.min(10, Math.floor((prev.xp + (delta.xp||0)) / 500) + 1));
      const updated = { ...prev, ...delta, level: delta.level || newLevel };
      const users = JSON.parse(localStorage.getItem("ml_users") || "[]");
      const idx = users.findIndex(u => u.id === updated.id);
      if (idx >= 0) users[idx] = updated;
      localStorage.setItem("ml_users", JSON.stringify(users));
      localStorage.setItem("ml_current", JSON.stringify(updated));
      return updated;
    });
  }

  function logout() {
    localStorage.removeItem("ml_current");
    setUser(null); setShowPreQuiz(false); setPage("dashboard");
  }

  if (!user) return <><AuthPage onAuth={handleAuth}/><NotifToast/></>;
  if (showPreQuiz) return <><PreQuiz onComplete={handlePreQuiz}/><NotifToast/></>;

  const pages = {
    dashboard: <Dashboard user={user} setPage={setPage}/>,
    simulation: <Simulation user={user} updateUser={updateUser}/>,
    quiz: <Quiz user={user} updateUser={updateUser}/>,
    multiplayer: <Multiplayer user={user}/>,
    leaderboard: <Leaderboard user={user}/>,
    profile: <Profile user={user} updateUser={updateUser} onLogout={logout}/>,
    mentorship: <Mentorship user={user}/>,
    counselling: <Counselling user={user}/>,
    institutions: <Institutions/>
  };

  return (
    <div className="app-shell">
      <Sidebar page={page} setPage={setPage} user={user} onLogout={logout}/>
      <div className="main-content">
        <div className="top-bar">
          <div style={{fontSize:14,color:"var(--text2)"}}>
            {page.charAt(0).toUpperCase()+page.slice(1)}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span className="badge badge-green">
              <span style={{width:6,height:6,borderRadius:"50%",background:"var(--success)",display:"inline-block"}}/>
              Online
            </span>
            <span style={{fontSize:13,color:"var(--text2)"}}>{user.name}</span>
          </div>
        </div>
        {pages[page] || pages.dashboard}
      </div>
      <NotifToast/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
