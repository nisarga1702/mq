<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediQuest — Gamified Medical Learning Platform</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --bg4: #1e2d45;
    --card: #131c2e;
    --border: rgba(99,179,237,0.12);
    --border2: rgba(99,179,237,0.22);
    --accent: #38bdf8;
    --accent2: #818cf8;
    --accent3: #34d399;
    --accent4: #f472b6;
    --accent5: #fb923c;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --danger: #f87171;
    --warn: #fbbf24;
    --success: #34d399;
    --r: 12px;
    --r2: 8px;
    --shadow: 0 4px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Layout */
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; min-height: 100vh; background: var(--card);
    border-right: 1px solid var(--border); display: flex;
    flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100;
  }
  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: -2px; }
  .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: var(--r2); cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text2); transition: all .15s; border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--bg4); color: var(--text); }
  .nav-item.active { background: rgba(56,189,248,0.12); color: var(--accent); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-section { font-size: 10px; font-weight: 700; color: var(--text3); padding: 12px 12px 4px; letter-spacing: .08em; text-transform: uppercase; }
  .sidebar-user {
    padding: 14px 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .main-content { margin-left: 240px; flex: 1; min-height: 100vh; }
  .top-bar {
    height: 60px; background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; position: sticky; top: 0; z-index: 50;
  }
  .page-content { padding: 28px; max-width: 1200px; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 20px;
  }
  .card-sm { padding: 14px 16px; }
  .grid { display: grid; gap: 16px; }
  .g2 { grid-template-columns: repeat(2, 1fr); }
  .g3 { grid-template-columns: repeat(3, 1fr); }
  .g4 { grid-template-columns: repeat(4, 1fr); }

  /* Stat cards */
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 18px 20px;
  }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  .stat-value { font-size: 28px; font-weight: 800; font-family: 'Syne', sans-serif; margin-top: 6px; }
  .stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: var(--r2); font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #0a0e1a; }
  .btn-primary:hover { background: #7dd3f9; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border2); }
  .btn-outline:hover { background: var(--bg4); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #0a0e1a; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-lg { padding: 14px 28px; font-size: 16px; }
  .btn-block { width: 100%; justify-content: center; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge-blue { background: rgba(56,189,248,0.15); color: var(--accent); }
  .badge-green { background: rgba(52,211,153,0.15); color: var(--success); }
  .badge-purple { background: rgba(129,140,248,0.15); color: var(--accent2); }
  .badge-orange { background: rgba(251,146,60,0.15); color: var(--accent5); }
  .badge-pink { background: rgba(244,114,182,0.15); color: var(--accent4); }
  .badge-red { background: rgba(248,113,113,0.15); color: var(--danger); }

  /* Progress */
  .progress-bar { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }

  /* Forms */
  input, select, textarea {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r2); color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 10px 14px; width: 100%; outline: none; transition: border .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  label { font-size: 13px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* Tag */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .fade-in { animation: fadeIn .3s ease; }

  /* Notification */
  .notif {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    background: var(--card); border: 1px solid var(--border2); border-radius: var(--r);
    padding: 14px 18px; max-width: 320px; box-shadow: var(--shadow);
    animation: fadeIn .3s ease; display: flex; align-items: flex-start; gap: 10px;
  }

  /* Modals */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 200; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--card); border: 1px solid var(--border2); border-radius: var(--r);
    padding: 28px; max-width: 540px; width: 90vw; max-height: 90vh;
    overflow-y: auto; animation: fadeIn .25s ease;
  }
  .modal-lg { max-width: 800px; }

  /* Auth */
  .auth-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 50%, rgba(56,189,248,0.05) 0%, transparent 50%),
                      radial-gradient(circle at 80% 20%, rgba(129,140,248,0.05) 0%, transparent 50%);
  }
  .auth-card {
    background: var(--card); border: 1px solid var(--border2);
    border-radius: 16px; padding: 40px; width: 420px; max-width: 95vw;
    box-shadow: var(--shadow);
  }

  /* Simulation */
  .sim-patient { border-left: 3px solid var(--accent5); }
  .choice-opt {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2);
    padding: 12px 16px; cursor: pointer; font-size: 14px; transition: all .15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .choice-opt:hover { border-color: var(--accent); background: rgba(56,189,248,0.06); }
  .choice-opt.selected { border-color: var(--accent); background: rgba(56,189,248,0.12); }
  .choice-opt.correct { border-color: var(--success); background: rgba(52,211,153,0.12); }
  .choice-opt.wrong { border-color: var(--danger); background: rgba(248,113,113,0.12); }

  /* Quiz */
  .quiz-opt {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 14px 18px; cursor: pointer;
    font-size: 14px; transition: all .15s; margin-bottom: 8px;
  }
  .quiz-opt:hover:not(.disabled) { border-color: var(--accent); background: rgba(56,189,248,0.07); }
  .quiz-opt.selected { border-color: var(--accent2); background: rgba(129,140,248,0.1); }
  .quiz-opt.correct { border-color: var(--success) !important; background: rgba(52,211,153,0.12) !important; }
  .quiz-opt.wrong { border-color: var(--danger) !important; background: rgba(248,113,113,0.12) !important; }
  .quiz-opt.disabled { cursor: default; }

  /* Leaderboard */
  .lb-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .lb-rank { font-size: 18px; font-weight: 800; font-family: 'Syne', sans-serif; width: 32px; text-align: center; }

  /* Room */
  .chat-msg { margin-bottom: 10px; }
  .chat-bubble {
    display: inline-block; padding: 8px 12px; border-radius: 10px;
    font-size: 13px; max-width: 280px;
  }
  .chat-bubble.me { background: rgba(56,189,248,0.15); color: var(--accent); }
  .chat-bubble.them { background: var(--bg3); color: var(--text); }

  /* Level progress */
  .level-badge {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px;
  }

  /* Scrollable */
  .scroll-y { overflow-y: auto; }

  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .main-content { margin-left: 200px; }
    .g4 { grid-template-columns: repeat(2, 1fr); }
    .g3 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .sidebar { transform: translateX(-200px); }
    .main-content { margin-left: 0; }
    .g2,.g3,.g4 { grid-template-columns: 1fr; }
  }

  /* ====== ADAPTIVE LEARNING SYSTEM ====== */
  .roadmap-wrap { position: relative; padding: 0 0 40px; }
  .roadmap-spine {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 3px; top: 0; bottom: 0;
    background: linear-gradient(to bottom, var(--accent), var(--accent2), var(--accent4));
    opacity: 0.25; border-radius: 3px;
  }
  .roadmap-node-row {
    display: flex; align-items: center; gap: 0;
    margin-bottom: 28px; position: relative;
  }
  .roadmap-node-row:nth-child(even) { flex-direction: row-reverse; }
  .roadmap-node-row:nth-child(even) .node-content { text-align: right; align-items: flex-end; }
  .node-center { width: 80px; flex-shrink: 0; display: flex; justify-content: center; z-index: 2; }
  .node-circle {
    width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; border: 3px solid; cursor: pointer;
    transition: all .25s; position: relative;
  }
  .node-circle:hover { transform: scale(1.12); }
  .node-circle.skip  { border-color: var(--success); background: rgba(52,211,153,0.15); box-shadow: 0 0 16px rgba(52,211,153,0.3); }
  .node-circle.light { border-color: var(--warn);    background: rgba(251,191,36,0.15);  box-shadow: 0 0 16px rgba(251,191,36,0.3); }
  .node-circle.deep  { border-color: var(--accent);  background: rgba(56,189,248,0.15);  box-shadow: 0 0 16px rgba(56,189,248,0.3); }
  .node-circle.done  { border-color: var(--accent3); background: rgba(52,211,153,0.25);  box-shadow: 0 0 20px rgba(52,211,153,0.5); }
  .node-circle.locked{ border-color: var(--text3);   background: rgba(100,116,139,0.1);  opacity: 0.45; cursor: not-allowed; }
  @keyframes nodeGlow { 0%,100%{box-shadow:0 0 10px rgba(56,189,248,0.5);} 50%{box-shadow:0 0 24px rgba(56,189,248,0.9);} }
  .node-circle.active-node { animation: nodeGlow 2s infinite; }
  .node-content { flex: 1; display: flex; flex-direction: column; gap: 4px; padding: 0 12px; }
  .node-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px 16px;
    transition: all .2s; cursor: pointer; max-width: 380px;
  }
  .node-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .node-card.skip-card  { border-color: rgba(52,211,153,0.35); }
  .node-card.light-card { border-color: rgba(251,191,36,0.35); }
  .node-card.deep-card  { border-color: rgba(56,189,248,0.35); }
  .node-card.done-card  { border-color: rgba(52,211,153,0.6);  }

  /* Lesson view */
  .lesson-header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
  .lesson-section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; color: var(--accent); margin-bottom: 8px;
  }
  .keyfact { display: flex; gap: 10px; padding: 9px 12px; background: var(--bg3); border-radius: 6px; margin-bottom: 6px; font-size: 13px; line-height: 1.5; }
  .mnemonic-box { background: rgba(129,140,248,0.08); border: 1px solid rgba(129,140,248,0.3); border-radius: var(--r2); padding: 14px 16px; font-size: 13px; line-height: 1.7; }
  .clinical-box { background: rgba(56,189,248,0.06); border-left: 3px solid var(--accent); padding: 12px 16px; font-size: 13px; line-height: 1.7; border-radius: 0 var(--r2) var(--r2) 0; }
  .lesson-progress { display: flex; gap: 6px; align-items: center; margin-bottom: 20px; }
  .lp-step { height: 4px; flex: 1; border-radius: 2px; background: var(--bg4); transition: background .3s; }
  .lp-step.done-step { background: var(--success); }
  .lp-step.cur-step  { background: var(--accent); }

  /* Assessment */
  .assess-goal-card { cursor: pointer; text-align: center; padding: 20px 14px; transition: all .2s; border: 2px solid var(--border); }
  .assess-goal-card:hover  { border-color: var(--accent); background: rgba(56,189,248,0.06); }
  .assess-goal-card.selected-goal { border-color: var(--accent); background: rgba(56,189,248,0.12); }
  .diff-tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  }
  .diff-easy   { background: rgba(52,211,153,0.2);  color: var(--success); }
  .diff-medium { background: rgba(251,191,36,0.2);  color: var(--warn); }
  .diff-hard   { background: rgba(248,113,113,0.2); color: var(--danger); }
  .diff-tricky { background: rgba(244,114,182,0.2); color: var(--accent4); }

  /* Strength/weakness bars */
  .topic-score-bar { margin-bottom: 12px; }
  .tsb-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .tsb-bar { height: 8px; background: var(--bg4); border-radius: 4px; overflow: hidden; }
  .tsb-fill { height: 100%; border-radius: 4px; transition: width .8s cubic-bezier(.4,0,.2,1); }
</style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ==================== DATA ==================== */

const MOCK_CASES = [
  {
    id: 1, title: "Chest Pain — 58M", difficulty: "beginner",
    specialty: "Cardiology",
    presentation: "A 58-year-old male presents to the ER with sudden onset severe crushing chest pain radiating to the left arm. BP 160/95, HR 110 bpm, diaphoresis noted. Pain started 2 hours ago.",
    vitals: { temp: "36.8°C", bp: "160/95 mmHg", hr: "110 bpm", spo2: "95%", rr: "22/min" },
    history: "Hypertension, Type 2 DM, smoker (30 pack-years), no prior cardiac events.",
    symptoms: ["Crushing chest pain", "Left arm radiation", "Diaphoresis", "Shortness of breath", "Nausea"],
    investigations: ["ECG", "Troponin I", "CBC", "CXR", "Echo"],
    diagnosisOptions: [
      { id: "a", text: "STEMI (ST-Elevation Myocardial Infarction)", correct: true },
      { id: "b", text: "Unstable Angina" },
      { id: "c", text: "Pulmonary Embolism" },
      { id: "d", text: "Aortic Dissection" }
    ],
    treatmentOptions: [
      { id: "a", text: "Aspirin 300mg + Primary PCI", correct: true },
      { id: "b", text: "IV Heparin + Thrombolytics only" },
      { id: "c", text: "Nitroglycerin + Observation" },
      { id: "d", text: "Morphine + Discharge" }
    ],
    outcome: "Patient stabilized after primary PCI. Door-to-balloon time was 48 minutes. Ejection fraction preserved at 55%.",
    learning: "STEMI requires rapid reperfusion. Door-to-balloon time should be <90 minutes. Aspirin and anticoagulation are cornerstone therapies.",
    points: 120
  },
  {
    id: 2, title: "Fever + Rash — 8F", difficulty: "beginner",
    specialty: "Pediatrics",
    presentation: "An 8-year-old girl presents with 3-day history of high fever (39.5°C), diffuse erythematous rash starting from trunk, and bilateral conjunctivitis. No travel history.",
    vitals: { temp: "39.5°C", bp: "95/60 mmHg", hr: "128 bpm", spo2: "98%", rr: "26/min" },
    history: "Up-to-date vaccinations. No known drug allergies. No sick contacts reported.",
    symptoms: ["High fever >5 days", "Bilateral conjunctivitis", "Strawberry tongue", "Erythematous rash", "Hands/feet edema"],
    investigations: ["CBC + CRP", "ESR", "Echo (coronary artery)", "Blood culture", "LFT"],
    diagnosisOptions: [
      { id: "a", text: "Kawasaki Disease", correct: true },
      { id: "b", text: "Scarlet Fever" },
      { id: "c", text: "Measles" },
      { id: "d", text: "Viral Exanthem" }
    ],
    treatmentOptions: [
      { id: "a", text: "IVIG 2g/kg + Aspirin", correct: true },
      { id: "b", text: "Antibiotics only" },
      { id: "c", text: "Antipyretics + Hydration" },
      { id: "d", text: "Steroids monotherapy" }
    ],
    outcome: "After IVIG + Aspirin, fever resolved in 36 hours. Echo showed mild coronary artery dilation that resolved at 6-week follow-up.",
    learning: "Kawasaki Disease: 5 days fever + 4/5 criteria (rash, conjunctivitis, mucous membrane changes, extremity changes, cervical lymphadenopathy). IVIG reduces coronary aneurysm risk.",
    points: 100
  },
  {
    id: 3, title: "Confusion + Polyuria — 45M", difficulty: "intermediate",
    specialty: "Endocrinology",
    presentation: "A 45-year-old male brought in confused. History of polydipsia and polyuria for 2 weeks. No prior diagnosis. On exam: Kussmaul breathing, fruity breath odour noted. Partner reports weight loss of 8kg over 1 month.",
    vitals: { temp: "37.0°C", bp: "95/65 mmHg", hr: "122 bpm", spo2: "99%", rr: "28/min" },
    history: "No prior medical history. Family history: father has Type 2 DM.",
    symptoms: ["Confusion / altered sensorium", "Kussmaul breathing", "Fruity odour", "Polydipsia / polyuria", "Weight loss"],
    investigations: ["RBS/HbA1c", "Blood gas (ABG)", "Serum electrolytes", "Urine ketones", "Serum osmolality"],
    diagnosisOptions: [
      { id: "a", text: "Diabetic Ketoacidosis (DKA)", correct: true },
      { id: "b", text: "Hyperosmolar Hyperglycaemic State (HHS)" },
      { id: "c", text: "Lactic Acidosis" },
      { id: "d", text: "Hypoglycaemia" }
    ],
    treatmentOptions: [
      { id: "a", text: "IV Fluids + Insulin infusion + K⁺ replacement", correct: true },
      { id: "b", text: "Oral hypoglycaemics + Observation" },
      { id: "c", text: "Glucagon 1mg IV" },
      { id: "d", text: "Sodium bicarbonate alone" }
    ],
    outcome: "DKA resolved in 18 hours with aggressive fluid resuscitation and insulin drip. Transitioned to SC insulin on day 2.",
    learning: "DKA triad: hyperglycaemia, ketosis, metabolic acidosis. Fluid replacement is the first priority before insulin. Monitor K⁺ closely — falls precipitously with insulin therapy.",
    points: 150
  },
  {

/* ==================== AUTH ==================== */
function AuthPage({ onAuth }) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({ name:"", email:"", password:"", role:"student" });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  function submit(e) {
    e.preventDefault(); setErr("");
    if (!form.email || !form.password) { setErr("All fields required"); return; }
    if (mode === "signup" && !form.name) { setErr("Name required"); return; }
    setLoading(true);
    setTimeout(() => {
      const users = JSON.parse(localStorage.getItem("ml_users") || "[]");
      if (mode === "login") {
        const u = users.find(u => u.email === form.email && u.password === form.password);
        if (!u) { setErr("Invalid credentials"); setLoading(false); return; }
        localStorage.setItem("ml_current", JSON.stringify(u));
        onAuth(u);
      } else {
        if (users.find(u => u.email === form.email)) { setErr("Email already registered"); setLoading(false); return; }
        const newUser = {
          id: Date.now(), name: form.name, email: form.email,
          password: form.password, role: form.role,
          level: 1, xp: 0, score: 0, quizScores: [], casesCompleted: 0,
          accuracy: 0, totalAnswers: 0, correctAnswers: 0,
          preQuizDone: false, preQuizLevel: "beginner",
          color: ["#38bdf8","#818cf8","#34d399","#f472b6","#fb923c"][Math.floor(Math.random()*5)]
        };
        users.push(newUser);
        localStorage.setItem("ml_users", JSON.stringify(users));
        localStorage.setItem("ml_current", JSON.stringify(newUser));
        onAuth(newUser);
      }
      setLoading(false);
    }, 700);
  }

  return (
    <div className="auth-page">
      <div className="auth-card fade-in">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#38bdf8,#818cf8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px"}}>⚕️</div>
          <h1 style={{fontSize:26,fontWeight:800,marginBottom:4}}>MediQuest</h1>
          <p style={{color:"var(--text3)",fontSize:13}}>Gamified Medical Learning Platform</p>
        </div>

        <div style={{display:"flex",background:"var(--bg3)",borderRadius:10,padding:3,marginBottom:22,gap:2}}>
          {["login","signup"].map(m=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"9px 0",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:14,transition:"all .15s",background:mode===m?"var(--card)":"transparent",color:mode===m?"var(--text)":"var(--text3)"}}>
              {m==="login"?"Sign In":"Sign Up"}
            </button>
          ))}
        </div>

        <form onSubmit={submit}>
          {mode==="signup" && (
            <div className="form-group">
              <label>Full Name</label>
              <input placeholder="Dr. Your Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
            </div>
          )}
          <div className="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="you@hospital.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} />
          </div>
          <div className="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} />
          </div>
          {mode==="signup" && (
            <div className="form-group">
              <label>Your Role</label>
              <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                <option value="student">Medical Student</option>
                <option value="intern">Intern</option>
                <option value="doctor">Doctor</option>
                <option value="nurse">Nurse</option>
                <option value="mentor">Mentor</option>
              </select>
            </div>
          )}
          {err && <p style={{color:"var(--danger)",fontSize:13,marginBottom:14}}>{err}</p>}
          <button className="btn btn-primary btn-block btn-lg" disabled={loading} style={{marginTop:4}}>
            {loading ? "Please wait…" : mode==="login" ? "Sign In →" : "Create Account →"}
          </button>
        </form>

        {mode==="login" && (
          <div style={{marginTop:16,padding:12,background:"var(--bg3)",borderRadius:8,fontSize:12,color:"var(--text3)"}}>
            <strong style={{color:"var(--text2)"}}>Demo:</strong> Sign up as a new user to start fresh, or use any account you've created.
          </div>
        )}
      </div>
    </div>
  );
}

/* ==================== PRE-QUIZ ==================== */
function PreQuiz({ onComplete }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);

  const beginnerQs = QUIZ_QUESTIONS.filter(q=>q.difficulty==="beginner").slice(0,5);

  function next() {
    if (selected===null) return;
    const newAns = [...answers, selected];
    if (step < beginnerQs.length-1) {
      setAnswers(newAns); setSelected(null); setStep(s=>s+1);
    } else {
      const correct = newAns.filter((a,i)=>a===beginnerQs[i].ans).length;
      const score = (correct/beginnerQs.length)*100;
      let level = score >= 80 ? "advanced" : score >= 50 ? "intermediate" : "beginner";
      onComplete(level, score);
    }
  }

  const q = beginnerQs[step];
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div style={{width:560,maxWidth:"95vw"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <span className="badge badge-blue" style={{fontSize:13,padding:"6px 14px"}}>Pre-Assessment Quiz</span>
          <h2 style={{fontSize:22,marginTop:12}}>Assess Your Current Level</h2>
          <p style={{color:"var(--text3)",fontSize:14,marginTop:4}}>5 questions to personalise your learning path</p>
        </div>
        <div style={{background:"var(--bg3)",borderRadius:4,height:6,marginBottom:20,overflow:"hidden"}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",width:`${(step/beginnerQs.length)*100}%`,transition:"width .5s"}}/>
        </div>
        <div className="card fade-in">
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:8}}>Question {step+1} of {beginnerQs.length}</div>
          <p style={{fontSize:16,fontWeight:600,marginBottom:20,lineHeight:1.5}}>{q.q}</p>
          {q.opts.map((opt,i)=>(
            <div key={i} className={`quiz-opt ${selected===i?"selected":""}`} onClick={()=>setSelected(i)}>
              <span style={{marginRight:8,color:selected===i?"var(--accent2)":"var(--text3)",fontWeight:700}}>{String.fromCharCode(65+i)}.</span>
              {opt}
            </div>
          ))}
          <button className="btn btn-primary" style={{marginTop:16}} disabled={selected===null} onClick={next}>
            {step < beginnerQs.length-1 ? "Next →" : "See Results →"}
          </button>
        </div>
      </div>
    </div>
  );
}

              <span style={{fontSize:13,fontWeight:700,color:"var(--accent)"}}>{u.score.toLocaleString()}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ==================== SIMULATION ==================== */
function Simulation({ user, updateUser }) {
  const [view, setView] = useState("list"); // list | sim
  const [currentCase, setCurrentCase] = useState(null);
  const [phase, setPhase] = useState("intro"); // intro | diagnosis | treatment | outcome
  const [diagSel, setDiagSel] = useState(null);
  const [txSel, setTxSel] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [role, setRole] = useState(null);

  function startCase(c) {
    setCurrentCase(c); setPhase("roleSelect"); setDiagSel(null); setTxSel(null); setShowResult(false); setView("sim");
  }

  function submitDiag() {
    if (!diagSel) return;
    setPhase("treatment");
  }

  function submitTx() {
    if (!txSel) return;
    const diagCorrect = currentCase.diagnosisOptions.find(d=>d.id===diagSel)?.correct||false;
    const txCorrect = currentCase.treatmentOptions.find(t=>t.id===txSel)?.correct||false;
    const pts = (diagCorrect?currentCase.points*0.5:0) + (txCorrect?currentCase.points*0.5:0);
    setShowResult(true);
    updateUser({
      score: user.score + pts,
      xp: user.xp + pts * 0.5,
      casesCompleted: user.casesCompleted + 1,
      totalAnswers: user.totalAnswers + 2,
      correctAnswers: user.correctAnswers + (diagCorrect?1:0) + (txCorrect?1:0)
    });
    notify(`Case completed! +${Math.round(pts)} pts`, "success");

  function diffColor(d) {

                  <span className="badge badge-purple">{c.specialty}</span>

                </div>
                <h3 style={{fontSize:16,fontWeight:700,marginBottom:6}}>{c.title}</h3>
                <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.5}}>{c.presentation.slice(0,120)}…</p>

            <div style={{display:"flex",gap:6,marginTop:12,flexWrap:"wrap"}}>

              {c.symptoms.length>3 && <span style={{fontSize:11,color:"var(--text3)"}}>+{c.symptoms.length-3} more</span>}
            </div>
            <button className="btn btn-primary btn-sm" style={{marginTop:14}} onClick={()=>startCase(c)}>

      <div className="grid g4" style={{marginBottom:20}}>

                <span style={{fontWeight:600}}>{v}</span>
              </div>
            ))}
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text3)",marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>Key Symptoms</div>
            {currentCase.symptoms.map(s=>(

        {currentCase.history && <><hr className="divider"/><div style={{fontSize:13,color:"var(--text2)"}}><strong style={{color:"var(--text)"}}>History:</strong> {currentCase.history}</div></>}

        <h3 style={{fontSize:18,fontWeight:800}}>What is your diagnosis?</h3>
        <p style={{color:"var(--text2)",fontSize:13,marginTop:4}}>Select the most likely diagnosis based on the clinical presentation</p>

      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {currentCase.diagnosisOptions.map(d=>(
          <div key={d.id} className={`choice-opt ${diagSel===d.id?"selected":""}`} onClick={()=>setDiagSel(d.id)}>
            <span style={{fontWeight:700,color:"var(--text3)",minWidth:18}}>{d.id.toUpperCase()}.</span>
            <span>{d.text}</span>
          </div>
        ))}
      </div>
      <button className="btn btn-primary" disabled={!diagSel} onClick={submitDiag}>Confirm Diagnosis →</button>
    </div>
  );

  // Treatment
  if (phase==="treatment") return (
    <div className="page-content fade-in">
      <div className="card" style={{marginBottom:20}}>

      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>

      <button className="btn btn-primary" disabled={!txSel} onClick={submitTx}>Submit Treatment →</button>

  // Outcome
  if (phase==="outcome") {
    const diagCorrect = currentCase.diagnosisOptions.find(d=>d.id===diagSel)?.correct||false;

              <div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>DIAGNOSIS</div>

              <div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>TREATMENT</div>

      </div>

  }

  return null;
}

/* ==================== QUIZ (ML-POWERED) ==================== */
const ML_API = 'http://localhost:5001';

function Quiz({ user, updateUser }) {
  const [mode, setMode] = React.useState('select');
  const [topic, setTopic] = React.useState('all');
  const [level, setLevel] = React.useState('beginner');
  const [sessionId, setSessionId] = React.useState(null);
  const [question, setQuestion] = React.useState(null);
  const [selected, setSelected] = React.useState(null);
  const [revealed, setRevealed] = React.useState(false);
  const [feedback, setFeedback] = React.useState(null);
  const [summary, setSummary] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [apiOnline, setApiOnline] = React.useState(null);
  const [levelChange, setLevelChange] = React.useState(null);

  const TOPICS = ['all','Anatomy','Physiology','Pharmacology','Pathology','Microbiology','Biochemistry','Clinical Medicine','Surgery'];

  React.useEffect(() => {
    fetch(ML_API + '/api/ml/status')
      .then(r => r.json())
      .then(d => setApiOnline(d))
      .catch(() => setApiOnline(false));
  }, []);

  async function startQuiz() {
    setLoading(true); setLevelChange(null);
    try {
      const r = await fetch(ML_API + '/api/ml/quiz/start', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ level, topic: topic === 'all' ? null : topic, n_questions: 10, adaptive: true })
      });
      const d = await r.json();
      setSessionId(d.session_id);
      setQuestion(d.question);
      setSelected(null); setRevealed(false); setFeedback(null); setSummary(null);
      setMode('quiz');
    } catch(e) { notify('ML API offline — check python ml_api.py', 'error'); }
    setLoading(false);
  }

  async function submitAnswer() {
    if (selected === null) return;
    setLoading(true);
    try {
      const r = await fetch(ML_API + '/api/ml/quiz/answer', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ session_id: sessionId, answer_index: selected })
      });
      const d = await r.json();
      setFeedback({ correct: d.is_correct, explanation: d.explanation, correct_text: d.correct_text });
      setRevealed(true);
      if (d.level_changed && d.level_changed !== question.difficulty) {
        setLevelChange(d.level_changed);
      }
      if (d.summary) {
        setSummary(d.summary);
        const pts = Math.round(d.summary.percentage * 0.5);
        updateUser({ score: user.score + pts, xp: user.xp + pts,
          quizScores: [...(user.quizScores||[]), { score: d.summary.percentage, difficulty: level, date: new Date().toLocaleDateString() }],
          totalAnswers: user.totalAnswers + d.summary.history.length,
          correctAnswers: user.correctAnswers + d.summary.history.filter(h=>h.is_correct).length
        });
      }
      if (d.next_question && !d.summary) {
        setTimeout(() => {
          setQuestion(d.next_question);
          setSelected(null); setRevealed(false); setFeedback(null); setLevelChange(null);
        }, 2200);
      }
    } catch(e) { notify('Error submitting answer','error'); }
    setLoading(false);
  }

  function diffColor(d) { return d==='beginner'?'var(--success)':d==='intermediate'?'var(--warn)':'var(--danger)'; }

  if (mode === 'select') return (
    <div className="page-content fade-in">
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:800}}>🧠 Adaptive ML Quiz</h2>
        <p style={{color:'var(--text2)',marginTop:4}}>Powered by a real ML classifier — difficulty adapts based on your performance</p>
      </div>
      {apiOnline === false && (
        <div className="card" style={{marginBottom:16,borderColor:'var(--danger)',background:'rgba(248,113,113,0.05)'}}>
          <div style={{color:'var(--danger)',fontWeight:700}}>⚠ ML API Offline</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>Run: <code style={{background:'var(--bg3)',padding:'2px 6px',borderRadius:4}}>python ml_api.py</code> in the project folder.</div>
        </div>
      )}
      {apiOnline && apiOnline.model && (
        <div className="card" style={{marginBottom:16,borderColor:'var(--accent3)',background:'rgba(52,211,153,0.05)',padding:'12px 16px'}}>
          <div style={{display:'flex',gap:16,alignItems:'center'}}>
            <span style={{fontSize:20}}>🤖</span>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:'var(--success)'}}>ML Model Online — {apiOnline.model}</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>CV F1: {apiOnline.cv_f1_macro} · {apiOnline.question_count} questions · 8 topics · Adaptive difficulty</div>
            </div>
          </div>
        </div>
      )}
      <div style={{marginBottom:16}}>
        <label style={{fontWeight:600,marginBottom:8,display:'block'}}>Topic</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {TOPICS.map(t => (
            <button key={t} onClick={()=>setTopic(t)} style={{padding:'6px 12px',borderRadius:20,border:'1px solid',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",
              background:topic===t?'var(--accent)':'transparent',color:topic===t?'#0a0e1a':'var(--text2)',borderColor:topic===t?'var(--accent)':'var(--border)'}}>
              {t}
            </button>
          ))}
        </div>
      </div>
      <div className="grid g3" style={{marginBottom:20}}>
        {['beginner','intermediate','hard'].map(d => (
          <div key={d} className="card" style={{cursor:'pointer',borderColor:level===d?diffColor(d):'var(--border)',transition:'all .15s'}} onClick={()=>setLevel(d)}>
            <div style={{fontSize:22,marginBottom:6}}>{d==='beginner'?'🌱':d==='intermediate'?'🔥':'⚡'}</div>
            <div style={{fontWeight:700,textTransform:'capitalize',color:level===d?diffColor(d):'var(--text)'}}>{d}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:3}}>ML adapts up or down from here</div>
          </div>
        ))}
      </div>
      <button className="btn btn-primary btn-lg" disabled={loading||apiOnline===false} onClick={startQuiz}>
        {loading?'Starting…':'Start ML Quiz →'}
      </button>
    </div>
  );

  if (mode === 'quiz' && summary) {
    const sc = summary.percentage;
    return (
      <div className="page-content fade-in">
        <div className="card" style={{textAlign:'center',padding:28,marginBottom:20,borderColor:sc>=70?'var(--success)':sc>=40?'var(--warn)':'var(--danger)'}}>
          <div style={{fontSize:48,marginBottom:10}}>{sc>=80?'🎯':sc>=60?'📚':'💡'}</div>
          <h2 style={{fontSize:28,fontWeight:800}}>{sc}%</h2>
          <p style={{color:'var(--text2)',marginTop:6}}>{summary.score} correct — {summary.verdict}</p>
          <div style={{marginTop:16,display:'flex',gap:20,justifyContent:'center',flexWrap:'wrap'}}>
            {summary.strengths.length>0 && <div style={{padding:'8px 14px',background:'rgba(52,211,153,0.1)',border:'1px solid var(--success)',borderRadius:8,fontSize:12}}>💪 Strong: {summary.strengths.join(', ')}</div>}
            {summary.weaknesses.length>0 && <div style={{padding:'8px 14px',background:'rgba(248,113,113,0.1)',border:'1px solid var(--danger)',borderRadius:8,fontSize:12}}>📖 Review: {summary.weaknesses.join(', ')}</div>}

        <div className="card" style={{marginBottom:16}}>

        {question.options.map((opt,i) => {

          if (revealed) {
            if (i === question._correct_index) cls += ' correct';
            else if (i === selected) cls += ' wrong';
            cls += ' disabled';
          } else if (i === selected) cls += ' selected';
          return (
            <div key={i} className={cls} onClick={()=>!revealed&&setSelected(i)}>
              <span style={{marginRight:8,fontWeight:700,color:'var(--text3)'}}>{String.fromCharCode(65+i)}.</span>{opt}
            </div>
          );
        })}
        {feedback && (
          <div className="card" style={{marginTop:12,borderLeft:`3px solid ${feedback.correct?'var(--success)':'var(--danger)'}`,background:feedback.correct?'rgba(52,211,153,0.05)':'rgba(248,113,113,0.05)'}}>
            <div style={{fontWeight:700,color:feedback.correct?'var(--success)':'var(--danger)',marginBottom:4}}>{feedback.correct?'✓ Correct!':'✗ Incorrect — Correct: '+feedback.correct_text}</div>
            <p style={{fontSize:13,lineHeight:1.6,color:'var(--text2)'}}>{feedback.explanation}</p>
          </div>
        )}
        <div style={{marginTop:16}}>
          {!revealed
            ? <button className="btn btn-outline" disabled={selected===null||loading} onClick={submitAnswer}>Check Answer</button>
            : !summary && <div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>Loading next question…</div>
          }
        </div>
      </div>
    );
  }

  return null;
}

function Multiplayer({ user }) {

  function createHumanoid(color, isPatient = false) {
    const group = new THREE.Group();
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.3*2 + 0.7, 8), new THREE.MeshStandardMaterial({ color }));
    torso.position.y = 0.6; group.add(torso);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
    head.position.y = 1.15; group.add(head);
    const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.08*2 + 0.5, 8), new THREE.MeshStandardMaterial({ color }));
    armL.position.set(-0.4, 0.7, 0); group.add(armL);
    const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.08*2 + 0.5, 8), new THREE.MeshStandardMaterial({ color }));
    armR.position.set(0.4, 0.7, 0); group.add(armR);
    const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.1*2 + 0.6, 8), new THREE.MeshStandardMaterial({ color }));
    legL.position.set(-0.15, 0.1, 0); group.add(legL);
    const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.1*2 + 0.6, 8), new THREE.MeshStandardMaterial({ color }));
    legR.position.set(0.15, 0.1, 0); group.add(legR);
    if(isPatient) group.rotation.x = -Math.PI/2;
    // Fallback if CapsuleGeometry fails (added by previous fix scripts)
    group.traverse(c => { if(c.geometry && c.geometry.type === 'CapsuleGeometry' && !THREE.CapsuleGeometry) c.geometry = new THREE.CylinderGeometry(c.geometry.parameters.radius, c.geometry.parameters.radius, c.geometry.parameters.length, 16); });
    return group;
  }

  function createTextLabel(text, subtext, color) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 80;
    ctx.fillStyle = 'rgba(10,14,26,0.95)';
    const x=0,y=0,w=300,h=80,r=15;
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = color || '#6366f1'; ctx.lineWidth = 4; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px DM Sans'; ctx.textAlign = 'center'; ctx.fillText(text, 150, 35);
    ctx.fillStyle = color || '#818cf8'; ctx.font = '600 16px DM Sans'; ctx.fillText(subtext, 150, 65);
    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
    sprite.scale.set(2, 0.5, 1);
    return sprite;
  }

  React.useEffect(() => {
    if (view !== 'room' || !canvasRef.current) return;
    const el = canvasRef.current;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(el.clientWidth, el.clientHeight);
    el.appendChild(renderer.domElement);
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x020617);
    const camera = new THREE.PerspectiveCamera(50, el.clientWidth/el.clientHeight, 0.1, 100);
    camera.position.set(5, 4, 6);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const light = new THREE.PointLight(0xffffff, 1.5); light.position.set(0, 10, 0); scene.add(light);
    
    scene.add(new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.2, 4.6), new THREE.MeshStandardMaterial({ color:0x94a3b8 })));
    const patient = createHumanoid(0xffdbac, true); patient.position.set(0, 0.6, 0); scene.add(patient);
    const pLabel = createTextLabel('PATIENT', 'STATUS: ' + vitals.status, '#f43f5e'); pLabel.position.y = 1.3; scene.add(pLabel);

    const activePlayers = [...players];
    if(!activePlayers.find(p=>p.name===user.name)) activePlayers.push({ name:user.name, role:myRole });
    const avatarGroup = new THREE.Group();
    activePlayers.forEach((p, i) => {
      const color = p.role==='Surgeon'?0xf87171:p.role==='Anaesthetic'?0x818cf8:p.role==='Assistant Intern'?0x34d399:0x6366f1;
      const doc = createHumanoid(color);
      const label = createTextLabel(p.name, ROLE_ICONS[p.role] + ' ' + p.role, '#' + color.toString(16).padStart(6,'0'));
      label.position.y = 1.6; doc.add(label);
      const ang = (i / Math.max(1, activePlayers.length)) * Math.PI * 2;
      doc.position.set(Math.cos(ang)*3.5, 0, Math.sin(ang)*3.5); doc.lookAt(0,0,0);
      avatarGroup.add(doc);
    });
    scene.add(avatarGroup);
    scene.add(new THREE.GridHelper(20, 20, 0x1e293b, 0x1e293b));

    if (window.THREE && THREE.OBJLoader) {
      new THREE.OBJLoader().load('/hackthonnn.obj', obj => {
        obj.scale.setScalar(0.02); obj.position.y = -0.5;
        obj.traverse(c => { if(c.isMesh) c.material = new THREE.MeshStandardMaterial({ color: 0x1e293b, transparent:true, opacity:0.3 }); });
        scene.add(obj);
      });
    }

    let raf;
    function animate() {
      raf = requestAnimationFrame(animate);
      patient.position.y = 0.6 + Math.sin(performance.now()*0.002)*0.01;
      avatarGroup.children.forEach((av, i) => { av.position.y = Math.sin(performance.now()*0.0015 + i)*0.05; });
      controls.update(); renderer.render(scene, camera);
    }
    animate();
    return () => { cancelAnimationFrame(raf); renderer.dispose(); if(el.contains(renderer.domElement)) el.removeChild(renderer.domElement); };
  }, [view, players, myRole, vitals.status]);

  const TOPICS = [
    {id:'Anatomy',        icon:'🦴', color:'#38bdf8', desc:'Body structure and organ relationships'},
    {id:'Physiology',     icon:'⚡', color:'#34d399', desc:'How body systems function'},
    {id:'Pharmacology',   icon:'💊', color:'#818cf8', desc:'Drug mechanisms and clinical use'},
    {id:'Pathology',      icon:'🔬', color:'#f472b6', desc:'Disease at cellular and tissue level'},
    {id:'Microbiology',   icon:'🦠', color:'#fb923c', desc:'Bacteria, viruses and immunity'},
    {id:'Biochemistry',   icon:'🧪', color:'#fbbf24', desc:'Metabolic pathways and enzymes'},
    {id:'Clinical Medicine',icon:'🩺',color:'#38bdf8', desc:'Diagnosis and disease management'},
    {id:'Surgery',        icon:'🔪', color:'#f87171', desc:'Surgical emergencies and technique'}
  ];

  const THEORY = {
    'Anatomy':          { overview:'Anatomy is the foundation of all clinical medicine. Understand precise organ locations, spatial relationships, and nerve supplies.',          facts:['Femur is the longest bone','SA node: 60-100 bpm pacemaker','Phrenic nerve C3,4,5 → diaphragm','Radial nerve injury = wrist drop','Mitral valve = left side (LA→LV)'],          mnemonic:`TPMA valve order: Toilet Paper My Ass → Tricuspid, Pulmonary, Mitral, Aortic
C3, 4, 5 keeps the diaphragm alive!` },
    'Physiology':       { overview:'Physiology explains HOW the body works. Master cardiac output, acid-base, and renal regulation for clinical reasoning.',                     facts:['CO = HR x SV = 5 L/min normal','EF <40% = HFrEF (systolic failure)','K+ sets resting membrane potential','ADH → water retention (collecting duct)','GFR = 120 mL/min normally'],          mnemonic:`ROME: Respiratory Opposite (pH↓, CO2↑), Metabolic Equal (pH↓, HCO3↓)
Frank-Starling: more stretch = more force (up to a point)` },
    'Pharmacology':     { overview:'Pharmacology covers drug mechanisms, interactions, and clinical prescribing. Focus on mechanisms and key side effects.',                      facts:['ACEIs (-pril): dry cough side effect','Aspirin: irreversible COX-1 and COX-2 inhibitor','Metformin: activates AMPK → ↓ gluconeogenesis','Rifampin: CYP450 inducer → ↓ warfarin effect','Azithromycin: blocks hERG → QT prolongation'],mnemonic:`ACE inhibitors end in -pril. ARBs end in -sartan. Beta-blockers end in -olol.
"Some Drugs Create Awesome Pharmacology": Sulfonamides, Diuretics, CCBs, ACEIs, Penicillins` },
    'Pathology':        { overview:'Pathology is the study of disease mechanisms at tissue and cellular level. Key areas: necrosis, inflammation, neoplasia.',                     facts:['TB → caseous necrosis','Reed-Sternberg cells → Hodgkin lymphoma','BRCA1/2 = homologous recombination defect','Wire-loop lesions = Lupus nephritis Class IV','MSI-H colorectal cancer responds to pembrolizumab'], mnemonic:'Necrosis mnemonics: Can Liquids Cause Fat Fibrin? = Coagulative, Liquefactive, Caseous, Fat, Fibrinoid' },
    'Microbiology':     { overview:'Microbiology covers pathogens, virulence factors, resistance mechanisms and their clinical presentations.',                                    facts:['E. coli = #1 UTI cause (80%)','S. aureus = coagulase positive','MRSA: mecA gene → PBP2a → pan β-lactam resistance','CD8+ CTLs control acute HIV viremia','Superantigens: activate 5-20% of all T cells non-specifically'], mnemonic:`Gram+ cocci clusters = Staph. Gram+ cocci chains = Strep.
For UTI: "E. Klebsi-cola, Pseudo-Proteus" = E.coli, Klebsiella, Pseudomonas, Proteus` },
    'Biochemistry':     { overview:'Biochemistry covers metabolic pathways, vitamins, and molecular biology relevant to clinical medicine and pharmacology.',                      facts:['ATP = universal energy currency','Pyruvate kinase deficiency → hemolytic anemia (RBCs need glycolysis)','OTC deficiency = most common urea cycle defect','Complex I inhibited by rotenone (metformin mechanism)','Vit C essential for collagen hydroxylation (proline/lysine)'], mnemonic:`ETC order: NADH → Complex I → Q → Complex III → Cytochrome c → Complex IV → O2
Urea cycle starts and ends with Ornithine (mnemonic: Ordinarily Careless Crappers)` },
    'Clinical Medicine':{ overview:'Clinical Medicine integrates pathophysiology with real diagnosis and treatment decisions. High-yield for exams and clinical work.',              facts:['S. pneumoniae = #1 CAP cause','Troponin rises 3-6h post-MI, peaks 24-48h','tPA for ischaemic stroke: give within 4.5h','DKA: IV fluids FIRST, then insulin, monitor K+','Sepsis: 30 mL/kg IV + antibiotics within 1h'], mnemonic:`FAST for stroke: Face drooping, Arm weakness, Speech difficulty, Time to call 999
DKA triad: hyperglycaemia + ketosis + metabolic acidosis` },
    'Surgery':          { overview:'Surgery covers acute abdomen, trauma assessment, and post-operative complications. ATLS principles are essential.',                            facts:['Rovsing sign: LLQ pressure causes RLQ pain','Tension PTX: needle decompression 2nd ICS MCL immediately','Pyloric stenosis: correct electrolytes BEFORE pyloromyotomy','Early dumping: 15-30 min, fluid shift. Late dumping: 1-3h, reactive hypoglycaemia','Anastomotic leak risk highest <5cm from anal verge'], mnemonic:`ATLS primary survey: ABCDE (Airway, Breathing, Circulation, Disability, Exposure)
Tension PTX = clinical diagnosis — act immediately, no CXR needed!` }
  };

  async function loadQuiz(topicId) {
    setLoadingQs(true); setQuizQs([]); setQuizIdx(0); setPicked(null); setRevealed(false); setQuizResults([]);
    try {
      const r = await fetch(ML + '/api/ml/questions?topic=' + encodeURIComponent(topicId) + '&n=5');
      const d = await r.json();
      setQuizQs(d.questions || []);
    } catch(e) { setQuizQs([]); }
    setLoadingQs(false);
  }

  function openTopic(t) { setActiveTopic(t); setMode('theory'); }

  function startQuiz() { loadQuiz(activeTopic.id); setMode('quiz'); }

  function submitAnswer() {
    const q = quizQs[quizIdx];
    const correct = picked === q.correct_index;
    setRevealed(true);
    setQuizResults(prev => [...prev, { correct }]);
  }

  function nextQ() {
    if (quizIdx < quizQs.length - 1) {
      setQuizIdx(i => i + 1); setPicked(null); setRevealed(false);
    } else {
      const allResults = [...quizResults, { correct: picked === quizQs[quizIdx]?.correct_index }];
      const score = allResults.filter(r => r.correct).length;
      const pct = Math.round(score / quizQs.length * 100);
      if (pct >= 60) {
        const rm = [...(user.roadmap || [])];
        const idx = rm.findIndex(r => r.id === activeTopic.id);
        if (idx >= 0) rm[idx].completed = true;
        else rm.push({ id: activeTopic.id, completed: true, status: 'done' });
        updateUser({ roadmap: rm, xp: user.xp + 100, score: user.score + score * 20 });
        notify('Topic mastered! +100 XP', 'success');
      } else {
        notify('Score: ' + pct + '% — Try again to master this topic', 'warn');
      }
      setMode('menu');
    }
  }

  function isCompleted(id) { return (user.roadmap || []).some(r => (r.id === id || r.topic === id) && r.completed); }

  /* ── THEORY VIEW ── */
  if (mode === 'theory' && activeTopic) {
    const th = THEORY[activeTopic.id] || {};
    return (
      <div className="page-content fade-in">
        <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:20}}>
          <button className="btn btn-outline btn-sm" onClick={() => setMode('menu')}>← Back to Topics</button>
          <span style={{fontSize:22}}>{activeTopic.icon}</span>
          <h2 style={{fontSize:20, fontWeight:800}}>{activeTopic.id}</h2>
        </div>

        <div className="card" style={{marginBottom:14, borderLeft:'3px solid '+activeTopic.color}}>
          <div className="lesson-section-label">📖 Overview</div>
          <p style={{lineHeight:1.7, fontSize:14, color:'var(--text)'}}>{th.overview}</p>
        </div>

        <div className="card" style={{marginBottom:14}}>
          <div className="lesson-section-label">🔑 Key Facts</div>
          {(th.facts || []).map((f, i) => (
            <div key={i} className="keyfact"><span>🔹</span><span>{f}</span></div>
          ))}
        </div>

        <div className="mnemonic-box" style={{marginBottom:20}}>
          <div className="lesson-section-label">🧠 Memory Tricks</div>
          <p style={{whiteSpace:'pre-line', fontSize:13, lineHeight:1.7}}>{th.mnemonic}</p>
        </div>

        <div className="clinical-box" style={{marginBottom:24}}>
          <strong style={{color:'var(--accent)'}}>🏥 Clinical Application:</strong>
          <span style={{color:'var(--text2)'}}> Understanding {activeTopic.id} helps you correctly diagnose, investigate and manage patients in real clinical scenarios.</span>
        </div>

        <button className="btn btn-primary btn-lg" onClick={startQuiz}>
          Test Your Knowledge with ML Quiz →
        </button>
      </div>
    );
  }

  /* ── QUIZ VIEW ── */
  if (mode === 'quiz') {
    if (loadingQs) return (
      <div className="page-content" style={{textAlign:'center', paddingTop:80}}>
        <div style={{fontSize:32, marginBottom:16}}>🤖</div>
        <p style={{color:'var(--text2)'}}>Loading questions from ML model…</p>
      </div>
    );

    if (!quizQs.length) return (
      <div className="page-content fade-in">
        <button className="btn btn-outline btn-sm" style={{marginBottom:20}} onClick={() => setMode('menu')}>← Back</button>
        <div className="card" style={{textAlign:'center', padding:32, borderColor:'var(--danger)'}}>
          <div style={{fontSize:40, marginBottom:12}}>⚠️</div>
          <h3>ML API Not Reachable</h3>
          <p style={{color:'var(--text2)', marginTop:8, fontSize:14}}>Start the ML API server first:</p>
          <code style={{display:'block', background:'var(--bg3)', padding:'10px 16px', borderRadius:8, marginTop:12, fontSize:13}}>python ml_api.py</code>
          <button className="btn btn-outline btn-sm" style={{marginTop:20}} onClick={() => setMode('menu')}>Back to Topics</button>
        </div>
      </div>
    );

    const q = quizQs[quizIdx];
    const prog = (quizIdx / quizQs.length) * 100;

    return (
      <div className="page-content fade-in">
        <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:12}}>
          <button className="btn btn-outline btn-sm" onClick={() => setMode('menu')}>← Exit Quiz</button>
          <span style={{fontSize:13, color:'var(--text3)'}}>Q{quizIdx+1}/{quizQs.length} — {activeTopic.id}</span>
          <span className={"diff-tag diff-"+q.difficulty} style={{marginLeft:'auto'}}>{q.difficulty}</span>
          {q.ml_predicted && <span style={{fontSize:10, color:'var(--text3)'}}>ML: {q.ml_predicted}</span>}
        </div>

        <div style={{height:4, background:'var(--bg4)', borderRadius:2, marginBottom:16}}>
          <div style={{height:'100%', background:activeTopic.color, width:prog+'%', borderRadius:2, transition:'width .4s'}}/>
        </div>

        <div className="card" style={{marginBottom:14}}>
          <p style={{fontSize:16, fontWeight:600, lineHeight:1.6}}>{q.question}</p>
        </div>

        {q.options.map((opt, i) => {
          let bg = 'var(--bg3)', bc = 'var(--border)', col = 'var(--text)';
          if (revealed) {
            if (i === q.correct_index) { bg='rgba(52,211,153,0.12)'; bc='var(--success)'; col='var(--success)'; }
            else if (i === picked)     { bg='rgba(248,113,113,0.12)'; bc='var(--danger)';  col='var(--danger)'; }
          } else if (i === picked) { bg='rgba(56,189,248,0.1)'; bc='var(--accent)'; }
          return (
            <div key={i} onClick={() => !revealed && setPicked(i)}
              style={{padding:'13px 16px', borderRadius:8, border:'1px solid '+bc, background:bg, color:col,
                marginBottom:8, cursor:revealed?'default':'pointer', fontSize:14, transition:'all .15s'}}>
              <span style={{fontWeight:700, marginRight:8, color:'var(--text3)'}}>{String.fromCharCode(65+i)}.</span>{opt}
            </div>
          );
        })}

        {revealed && (
          <div className="card" style={{marginTop:12, borderLeft:'3px solid var(--accent2)', background:'rgba(129,140,248,0.05)'}}>
            <div className="lesson-section-label">Explanation</div>
            <p style={{fontSize:13, lineHeight:1.6, color:'var(--text2)'}}>{q.explanation}</p>
          </div>
        )}

        <div style={{marginTop:16}}>
          {!revealed
            ? <button className="btn btn-outline" disabled={picked === null} onClick={submitAnswer}>Check Answer</button>
            : <button className="btn btn-primary" onClick={nextQ}>{quizIdx < quizQs.length-1 ? 'Next Question →' : 'Finish Topic ✓'}</button>
          }
        </div>
      </div>
    );
  }

  /* ── MAIN MENU ── */
  return (
    <div className="page-content fade-in">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24}}>
        <div>
          <h2 style={{fontSize:24, fontWeight:800}}>🗺️ Learning Path</h2>
          <p style={{color:'var(--text2)', marginTop:4}}>Select a topic — study theory then take a ML-powered quiz</p>
        </div>
        <button className="btn btn-outline btn-sm" onClick={() => { updateUser({roadmap:[]}); notify('Progress reset','info'); }}>
          Reset Progress
        </button>
      </div>

      <div className="grid g2" style={{gap:14, marginBottom:20}}>
        {TOPICS.map(t => {
          const done = isCompleted(t.id);
          return (
            <div key={t.id} className="card" style={{cursor:'pointer', borderColor:done?t.color+'88':'var(--border)',
              background:done?t.color+'0a':'var(--card)', transition:'all .2s'}}
              onClick={() => openTopic(t)}
              onMouseEnter={e => e.currentTarget.style.borderColor = t.color}
              onMouseLeave={e => e.currentTarget.style.borderColor = done?t.color+'88':'var(--border)'}>
              <div style={{display:'flex', gap:12, alignItems:'center'}}>
                <div style={{width:46, height:46, borderRadius:12, background:t.color+'22',
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, flexShrink:0}}>
                  {t.icon}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700, fontSize:15, color:done?t.color:'var(--text)'}}>{t.id}</div>
                  <div style={{fontSize:12, color:'var(--text3)', marginTop:2}}>{t.desc}</div>
                </div>
                <div>
                  {done
                    ? <span style={{fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:4,background:t.color+'22',color:t.color}}>✓ Done</span>
                    : <span style={{fontSize:18}}>→</span>
                  }
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="card" style={{background:'rgba(56,189,248,0.04)', borderColor:'var(--border2)'}}>
        <div style={{display:'flex', gap:12, alignItems:'center'}}>
          <span style={{fontSize:28}}>🤖</span>
          <div>
            <div style={{fontWeight:700, fontSize:13}}>ML-Powered Adaptive Quizzes</div>
            <div style={{fontSize:12, color:'var(--text3)', marginTop:3}}>
              Each quiz uses your trained ML model (SVM classifier, 49 clinical questions, 8 topics, adaptive difficulty).
              Make sure <code style={{background:'var(--bg3)', padding:'1px 5px', borderRadius:3}}>python ml_api.py</code> is running.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ==================== NOTIFICATION COMPONENT ==================== */
function NotifToast() {
  const [notif, setNotif] = useState(null);
  useEffect(() => { setGlobalNotif = setNotif; }, []);
  useEffect(() => { if (notif) { const t = setTimeout(()=>setNotif(null), 3500); return ()=>clearTimeout(t); } }, [notif]);
  if (!notif) return null;
  const colors = { success:"var(--success)", error:"var(--danger)", warn:"var(--warn)", info:"var(--accent)" };
  const icons = { success:"✓", error:"✕", warn:"⚠", info:"ℹ" };
  return (
    <div className="notif" style={{borderColor:colors[notif.type]||"var(--border2)"}}>
      <span style={{color:colors[notif.type]||"var(--accent)",fontWeight:700,fontSize:14}}>{icons[notif.type||"info"]}</span>
      <span style={{fontSize:13}}>{notif.msg}</span>
    </div>
  );
}

/* ==================== MAIN APP ==================== */
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [showPreQuiz, setShowPreQuiz] = useState(false);

  useEffect(() => {
    const saved = localStorage.getItem("ml_current");
    if (saved) {
      const u = JSON.parse(saved);
      setUser(u);
      if (!u.preQuizDone) setShowPreQuiz(true);
    }
  }, []);

  function handleAuth(u) {
    setUser(u);
    if (!u.preQuizDone) setShowPreQuiz(true);
  }

  function handlePreQuiz(level, score) {
    updateUser({ preQuizDone: true, preQuizLevel: level, xp: Math.round(score) });
    setShowPreQuiz(false);
    notify(`Level assessed: ${level.charAt(0).toUpperCase()+level.slice(1)}! 🎉`, "success");
  }

  function updateUser(delta) {
    setUser(prev => {
      const newLevel = Math.max(1, Math.min(10, Math.floor((prev.xp + (delta.xp||0)) / 500) + 1));
      const updated = { ...prev, ...delta, level: delta.level || newLevel };
      const users = JSON.parse(localStorage.getItem("ml_users") || "[]");
      const idx = users.findIndex(u => u.id === updated.id);
      if (idx >= 0) users[idx] = updated;
      localStorage.setItem("ml_users", JSON.stringify(users));
      localStorage.setItem("ml_current", JSON.stringify(updated));
      return updated;
    });
  }

  function logout() {
    localStorage.removeItem("ml_current");
    setUser(null); setShowPreQuiz(false); setPage("dashboard");
  }

  if (!user) return <><AuthPage onAuth={handleAuth}/><NotifToast/></>;
  if (showPreQuiz) return <><PreQuiz onComplete={handlePreQuiz}/><NotifToast/></>;

  const pages = {
    learning: <Learning user={user} updateUser={updateUser}/>,
    dashboard: <Dashboard user={user} setPage={setPage}/>,
    simulation: <Simulation user={user} updateUser={updateUser}/>,
    quiz: <Quiz user={user} updateUser={updateUser}/>,
    multiplayer: <Multiplayer user={user}/>,
    leaderboard: <Leaderboard user={user}/>,
    profile: <Profile user={user} updateUser={updateUser} onLogout={logout}/>,
    mentorship: <Mentorship user={user}/>,
    counselling: <Counselling user={user}/>,
    institutions: <Institutions/>
  };

  return (
    <div className="app-shell">
      <Sidebar page={page} setPage={setPage} user={user} onLogout={logout}/>
      <div className="main-content">
        <div className="top-bar">
          <div style={{fontSize:14,color:"var(--text2)"}}>
            {page.charAt(0).toUpperCase()+page.slice(1)}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span className="badge badge-green">
              <span style={{width:6,height:6,borderRadius:"50%",background:"var(--success)",display:"inline-block"}}/>
              Online
            </span>
            <span style={{fontSize:13,color:"var(--text2)"}}>{user.name}</span>
          </div>
        </div>
        {pages[page] || pages.dashboard}
      </div>
      <NotifToast/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
